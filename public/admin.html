<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tier Manager - CreeperTiers</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div class="page-shell admin-shell">
    <header class="admin-header">
      <div>
        <div class="eyebrow">Tier Manager</div>
        <h1>Signed in</h1>
      </div>
      <button class="logout-button" id="logoutButton">LOG OUT</button>
    </header>

    <div class="admin-panel">
      <div class="panel-row">
        <div class="panel-pill active">Overall</div>
        <div class="panel-pill">LTMs</div>
        <div class="panel-pill">Vanilla</div>
        <div class="panel-pill">UHC</div>
        <div class="panel-pill">Pot</div>
        <div class="panel-pill">NethOP</div>
        <div class="panel-pill">SMP</div>
        <div class="panel-pill">Sword</div>
        <div class="panel-pill">Axe</div>
        <div class="panel-pill">Mace</div>
      </div>

      <div class="editor-grid">
        <div class="field-group">
          <label>USERNAME</label>
          <input id="usernameInput" placeholder="Player username" />
        </div>
        <div class="field-group">
          <label>REGION</label>
          <select id="regionSelect">
            <option value="EU">EU</option>
            <option value="US">US</option>
            <option value="ASIA">ASIA</option>
          </select>
        </div>
        <div class="field-group">
          <label>GAMEMODE</label>
          <select id="gamemodeSelect">
            <option>Vanilla</option>
            <option>UHC</option>
            <option>Pot</option>
            <option>NethOP</option>
            <option>SMP</option>
            <option>Sword</option>
            <option>Axe</option>
            <option>Mace</option>
          </select>
        </div>
        <div class="field-group">
          <label>TIER</label>
          <select id="tierSelect">
            <option value="HT1">HT1</option>
            <option value="HT2">HT2</option>
            <option value="HT3">HT3</option>
            <option value="HT4">HT4</option>
            <option value="HT5">HT5</option>
            <option value="LT1">LT1</option>
            <option value="LT2">LT2</option>
            <option value="LT3">LT3</option>
            <option value="LT4">LT4</option>
            <option value="LT5">LT5</option>
          </select>
        </div>
        <button class="add-button" id="addEntryButton">ADD / UPDATE</button>
      </div>

      <div class="managed-entries-title">MANAGED ENTRIES</div>
      <div class="entries-table" id="managedEntries"></div>

      <div class="member-list-section">
        <div class="managed-entries-title">ALL MEMBERS</div>
        <input id="memberSearch" placeholder="Search members..." />
        <div class="member-list" id="memberList"></div>
      </div>
    </div>
  </div>

  <div class="login-modal" id="loginModal">
    <div class="login-card">
      <button class="close-modal" id="closeModal">×</button>
      <div class="login-title">Tier Manager Login</div>
      <div class="login-text">Use the manager credentials to access the tier management panel.</div>
      <label>EMAIL</label>
      <input id="loginEmail" placeholder="Enter manager email" />
      <label>PASSWORD</label>
      <input id="loginPassword" type="password" placeholder="Enter password" />
      <div class="login-help">Enter your manager credentials to access the tier panel.</div>
      <button class="login-button" id="loginButton">LOG IN</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
